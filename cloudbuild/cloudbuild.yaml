substitutions:
  _REGION: us-central1
  _SERVICE_NAME: daemonic-daemon-service-staging

steps:
  # Step 1: Install dependencies and run unit tests
  - name: python:3.11
    id: unit-tests
    entrypoint: bash
    args:
      - -c
      - |
        pip install --upgrade pip
        pip install -r requirements.txt
        pytest -q

  # Step 2: Build and deploy to Cloud Run (staging)
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-staging
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --source=.
      - --region=${_REGION}
      - --service-account=daemonic-core-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --no-allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},REGION=${_REGION},LIVE_MODE=false

options:
  logging: CLOUD_LOGGING_ONLY

